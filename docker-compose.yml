services:
  scraper:
    build: .
    image: movieplexx-mcp
    command: ["scrape", "--loop"]
    environment:
      POLL_INTERVAL_SECONDS: "3600"     # once per hour
      USER_AGENT: "MovieplexxProgrammMirror/0.1 (+kontakt@zahlenhelfer.de)"
      METRICS_PORT: "9000"
      LOG_LEVEL: INFO
    ports:
      - "9000:9000"                     # Prometheus /metrics
    volumes:
      - moviedata:/data
    restart: unless-stopped

  # Long-lived MCP server over Streamable-HTTP, for remote use (e.g. on a NAS).
  # Bind the host port to the LAN IP only (replace 192.168.1.50) so the endpoint
  # is not reachable over other interfaces / WAN. Requires MCP_AUTH_TOKEN in .env.
  # For local stdio use instead, the client launches the container on demand:
  #   docker run -i --rm -v moviedata:/data:ro movieplexx-mcp serve
  mcp:
    build: .
    image: movieplexx-mcp
    command: ["serve"]
    environment:
      MCP_TRANSPORT: http
      MCP_HOST: 0.0.0.0
      MCP_PORT: "8000"
      MCP_AUTH_TOKEN: ${MCP_AUTH_TOKEN:?set MCP_AUTH_TOKEN in .env}
      LOG_LEVEL: INFO
    ports:
      - "192.168.1.50:8000:8000"        # NAS LAN IP only — not 0.0.0.0
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - moviedata:/data:ro
    depends_on: [scraper]
    restart: unless-stopped

volumes:
  moviedata: {}
